  - generic [ref=e399]: 캔버스는 여러분의 디자인이 펼쳐지는 곳입니다. 페이지를 둘러보려면 Enter 키를 누르세요. 페이지의 그룹이나 요소를 둘러보려면 다시 Enter 키를 누르세요. 다음 페이지, 그룹 또는 요소로 이동하려면 Tab 키를 누르세요. 도구 모음을 작동하려면 “Ctrl+F1” 키를 사용하세요. 요소를 선택한 다음 화살표 키를 사용하여 움직이고, “,” 키와 “.” 키를 사용하여 회전하고, 화살표 키와 “Ctrl” 키를 사용하여 크기를 조정하세요. 모든 키는 “Shift 키” 키를 사용하여 단위를 늘릴 수 있습니다.
