  - generic [ref=e592]: 캔버스
  - generic [ref=e593]: 기본 탐색에는 문서 수준 옵션에 대한 버튼이 있습니다. 버튼 간에 전환하려면 왼쪽과 오른쪽 화살표 키를 사용하고 Enter 키를 눌러 활성화하세요. 캔버스로 건너뛰려면 “Ctrl+F2” 키를 누르세요.
  - generic [ref=e594]: 캔버스는 여러분의 디자인이 펼쳐지는 곳입니다. 페이지를 둘러보려면 Enter 키를 누르세요. 페이지의 그룹이나 요소를 둘러보려면 다시 Enter 키를 누르세요. 다음 페이지, 그룹 또는 요소로 이동하려면 Tab 키를 누르세요. 도구 모음을 작동하려면 “Ctrl+F1” 키를 사용하세요. 요소를 선택한 다음 화살표 키를 사용하여 움직이고, “,” 키와 “.” 키를 사용하여 회전하고, 화살표 키와 “Ctrl” 키를 사용하여 크기를 조정하세요. 모든 키는 “Shift 키” 키를 사용하여 단위를 늘릴 수 있습니다.
